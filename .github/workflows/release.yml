name: Release

on:
  release:
    types: [ released, prereleased ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Package release
    runs-on: ubuntu-latest
    env:
      PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}

    steps:
      - name: Fetch Sources
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Test, verify, and package
        run: ./gradlew test verifyPluginProjectConfiguration buildPlugin --no-daemon --stacktrace

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: editor-deck-release
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload release asset
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" build/distributions/*.zip --clobber

      - name: Publish to JetBrains Marketplace
        if: ${{ env.PUBLISH_TOKEN != '' }}
        env:
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: ./gradlew publishPlugin --no-daemon --stacktrace
